<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>whenever i see u | v4.1 (Asymmetric Galaxy Eyes)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        #webgl-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
        }

        #webcam {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
</head>
<body>

    <video id="webcam" autoplay playsinline></video>
    <canvas id="webgl-canvas"></canvas>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('webgl-canvas');

        let renderer, scene, camera, material, mesh, cameraTexture;
        
        let leftEyeRaw = new THREE.Vector2(0.5, 0.5);
        let rightEyeRaw = new THREE.Vector2(0.5, 0.5);
        let hasFace = false;

        let videoWidth = 1280;
        let videoHeight = 720;

        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            uniform sampler2D u_cameraTexture; 
            uniform vec2 iResolution;
            uniform vec2 u_videoResolution;
            uniform float iTime;
            uniform vec2 u_leftEyeRaw;   
            uniform vec2 u_rightEyeRaw;  
            uniform float u_hasFace;  
            varying vec2 vUv;

            // --- 背景星空的雜訊與隨機函數 ---
            vec3 hash( vec3 p ) {
                p = vec3( dot(p,vec3(127.1,311.7, 74.7)),
                          dot(p,vec3(269.5,183.3,246.1)),
                          dot(p,vec3(113.5,271.9,124.6)));
                return -1.0 + 2.0*fract(sin(p)*43758.5453123);
            }

            float noise( in vec3 p ) {
                vec3 i = floor( p );
                vec3 f = fract( p );
                vec3 u = f*f*(3.0-2.0*f);
                return mix( mix( mix( dot( hash( i + vec3(0.0,0.0,0.0) ), f - vec3(0.0,0.0,0.0) ), 
                                      dot( hash( i + vec3(1.0,0.0,0.0) ), f - vec3(1.0,0.0,0.0) ), u.x),
                                 mix( dot( hash( i + vec3(0.0,1.0,0.0) ), f - vec3(0.0,1.0,0.0) ), 
                                      dot( hash( i + vec3(1.0,1.0,0.0) ), f - vec3(1.0,1.0,0.0) ), u.x), u.y),
                            mix( mix( dot( hash( i + vec3(0.0,0.0,1.0) ), f - vec3(0.0,0.0,1.0) ), 
                                      dot( hash( i + vec3(1.0,0.0,1.0) ), f - vec3(1.0,0.0,1.0) ), u.x),
                                 mix( dot( hash( i + vec3(0.0,1.0,1.0) ), f - vec3(0.0,1.0,1.0) ), 
                                      dot( hash( i + vec3(1.0,1.0,1.0) ), f - vec3(1.0,1.0,1.0) ), u.x), u.y), u.z );
            }

            // --- 眼睛噴發星系的函數 (加入了時間差與旋轉方向參數) ---
            vec3 renderGalaxy(vec2 uv, vec2 center, float timeOffset, float swirlDir) {
                // 1. 測量距離，如果離眼睛太遠就直接跳過 (極度提升 GPU 效能)
                float dist = length(uv - center);
                float maxRadius = 0.35; 
                
                if (dist > maxRadius) return vec3(0.0);

                // 2. 將座標系統重置到以「眼睛」為中心，並放大縮放比例
                vec2 local_uv = (uv - center) * 4.0; 
                
                // 加入 timeOffset 創造兩隻眼睛的相位差
                float time = (iTime + 29.0 + timeOffset) * 60.0;
                float s = 0.0, v = 0.0;
                float t = time * 0.005;
                
                // 模擬星雲的扭曲旋轉，加入 swirlDir (1.0 順時針, -1.0 逆時針)
                local_uv.x += sin(t) * 0.3;
                float si = sin(t * 1.5) * swirlDir; 
                float co = cos(t);
                local_uv *= mat2(co, si, -si, co);
                
                vec3 col = vec3(0.0);
                vec3 init = vec3(0.25, 0.25 + sin(time * 0.001) * 0.1, time * 0.0008);
                
                // 核心碎形演算法
                for (int r = 0; r < 70; r++) { 
                    vec3 p = init + s * vec3(local_uv, 0.143);
                    p.z = mod(p.z, 2.0);
                    for (int i = 0; i < 9; i++) {
                        p = abs(p * 2.04) / dot(p, p) - 0.75;
                    }
                    v += length(p * p) * smoothstep(0.0, 0.5, 0.9 - s) * 0.002;
                    // 星空專屬的紫藍色調偏移
                    col += vec3(v * 0.8, 1.1 - s * 0.5, 0.7 + v * 0.5) * v * 0.013;
                    s += 0.01;
                }
                
                // 3. 利用平滑過濾(smoothstep)製造出圓形遮罩，讓星系往外漸層消散
                float mask = smoothstep(maxRadius, maxRadius * 0.2, dist);
                return col * mask;
            }

            // --- 座標轉換校正 ---
            vec2 transformCoordinates(vec2 rawCoord, float screenAspect, float videoAspect) {
                vec2 uv = vec2(rawCoord.x, 1.0 - rawCoord.y);
                if (screenAspect < videoAspect) {
                    float scale = screenAspect / videoAspect;
                    uv.x = (uv.x - 0.5) * scale + 0.5;
                } else {
                    float scale = videoAspect / screenAspect;
                    uv.y = (uv.y - 0.5) * scale + 0.5;
                }
                uv.x -= 0.5;
                uv.x *= screenAspect;
                uv.y -= 0.5;
                return uv;
            }

            void main() {
                float screenAspect = iResolution.x / iResolution.y;
                float videoAspect = u_videoResolution.x / u_videoResolution.y;
                
                // --- 1. 相機底圖處理 ---
                vec2 camUv = vUv;
                if (screenAspect < videoAspect) {
                    float scale = screenAspect / videoAspect;
                    camUv.x = (vUv.x - 0.5) * scale + 0.5;
                } else {
                    float scale = videoAspect / screenAspect;
                    camUv.y = (vUv.y - 0.5) * scale + 0.5;
                }
                
                vec2 lookupUv = vec2(1.0 - camUv.x, camUv.y);
                vec3 cameraCol = texture2D(u_cameraTexture, lookupUv).rgb;
                
                // 將相機畫面微壓暗
                cameraCol *= 0.55;
                
                // --- 2. 融入背景點綴星空 ---
                vec2 starUv = gl_FragCoord.xy / iResolution.xy;
                vec3 stars_direction = normalize(vec3((starUv * 2.0 - 1.0) * vec2(screenAspect, 1.0), 1.0)); 
                
                float stars_threshold = 9.0; 
                float stars_exposure = 175.0; 
                float stars = pow(clamp(noise(stars_direction * 200.0), 0.0, 1.0), stars_threshold) * stars_exposure;
                stars *= mix(0.4, 1.4, noise(stars_direction * 100.0 + vec3(iTime)));
                
                vec3 finalCol = clamp(cameraCol + vec3(stars), 0.0, 1.0);

                // --- 3. 雙眼星雲噴發特效 ---
                vec2 uv = gl_FragCoord.xy / iResolution.xy;
                uv.x -= 0.5;
                uv.x *= screenAspect;
                uv.y -= 0.5;
                
                vec2 leftEye = transformCoordinates(vec2(1.0 - u_leftEyeRaw.x, u_leftEyeRaw.y), screenAspect, videoAspect);
                vec2 rightEye = transformCoordinates(vec2(1.0 - u_rightEyeRaw.x, u_rightEyeRaw.y), screenAspect, videoAspect);
                
                vec3 eyeGalaxyFX = vec3(0.0);
                if (u_hasFace > 0.5) {
                    // 左眼：原時間軸，正向旋轉
                    eyeGalaxyFX += renderGalaxy(uv, leftEye, 0.0, 1.0);
                    // 右眼：時間快轉 50 秒，反向旋轉
                    eyeGalaxyFX += renderGalaxy(uv, rightEye, 50.0, -1.0);
                }
                
                // 將星系特效以發光(Additive)模式疊加上去
                finalCol = clamp(finalCol + eyeGalaxyFX, 0.0, 1.0);
                
                // --- 4. 畫面暗角 (Vignette) ---
                vec2 centerDist = (gl_FragCoord.xy / iResolution.xy) - 0.5;
                float vignette = smoothstep(0.75, 0.25, length(centerDist));
                finalCol *= mix(0.3, 1.0, vignette);

                gl_FragColor = vec4(finalCol, 1.0);
            }
        `;

        function initWebGL() {
            const width = window.innerWidth;
            const height = window.innerHeight;

            renderer = new THREE.WebGLRenderer({ canvas: canvasElement, antialias: true });
            renderer.setSize(width, height);

            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

            cameraTexture = new THREE.VideoTexture(videoElement);
            cameraTexture.minFilter = THREE.LinearFilter;
            cameraTexture.magFilter = THREE.LinearFilter;

            const uniforms = {
                u_cameraTexture: { value: cameraTexture },
                iResolution: { value: new THREE.Vector2(width, height) },
                u_videoResolution: { value: new THREE.Vector2(1280, 720) }, 
                iTime: { value: 0 },
                u_leftEyeRaw: { value: leftEyeRaw },
                u_rightEyeRaw: { value: rightEyeRaw },
                u_hasFace: { value: 0.0 }
            };

            material = new THREE.ShaderMaterial({
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                uniforms: uniforms
            });

            const geometry = new THREE.PlaneGeometry(2, 2);
            mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            window.addEventListener('resize', onWindowResize);
            animate(0);
        }

        function onWindowResize() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            renderer.setSize(width, height);
            material.uniforms.iResolution.value.set(width, height);
        }

        function animate(timestamp) {
            requestAnimationFrame(animate);
            material.uniforms.iTime.value = timestamp / 1000.0;
            material.uniforms.u_leftEyeRaw.value.copy(leftEyeRaw);
            material.uniforms.u_rightEyeRaw.value.copy(rightEyeRaw);
            material.uniforms.u_hasFace.value = hasFace ? 1.0 : 0.0;
            
            if (videoElement.videoWidth) {
                material.uniforms.u_videoResolution.value.set(videoElement.videoWidth, videoElement.videoHeight);
            }

            renderer.render(scene, camera);
        }

        const faceMesh = new FaceMesh({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
        });

        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        faceMesh.onResults(results => {
            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                hasFace = true;
                const landmarks = results.multiFaceLandmarks[0];
                const leftEye = landmarks[468];
                const rightEye = landmarks[473];

                leftEyeRaw.set(leftEye.x, leftEye.y);
                rightEyeRaw.set(rightEye.x, rightEye.y);
            } else {
                hasFace = false;
            }
        });

        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                await faceMesh.send({ image: videoElement });
            },
            width: 1280,
            height: 720
        });

        window.addEventListener('load', () => {
            initWebGL();
            cameraUtils.start().catch(err => {
                console.error("相機啟動失敗：", err);
            });
        });
    </script>
</body>
</html>
