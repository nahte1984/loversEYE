<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動眼睛煙火特效 - 粒粒分明修正版</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #webgl-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
        }

        #webcam {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: 1;
            transform: scaleX(-1);
            display: none; /* 完全交由 WebGL 繪製底圖 */
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
</head>
<body>

    <video id="webcam" autoplay playsinline></video>
    <canvas id="webgl-canvas"></canvas>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('webgl-canvas');

        let renderer, scene, camera, material, mesh, cameraTexture;
        let leftEyePos = new THREE.Vector2(-999.0, -999.0);
        let rightEyePos = new THREE.Vector2(-999.0, -999.0);
        let hasFace = false;

        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            uniform sampler2D u_cameraTexture; 
            uniform vec2 iResolution;
            uniform float iTime;
            uniform vec2 u_leftEye;   
            uniform vec2 u_rightEye;  
            uniform float u_hasFace;  
            varying vec2 vUv;

            #define PI 3.141592653589793238
            #define S(x,y,z) smoothstep(x,y,z)
            #define B(x,y,z,w) S(x-z, x+z, w)*S(y+z, y-z, w)
            #define saturate(x) clamp(x,0.,1.)

            // 調少粒子量與爆炸數量，讓畫面更乾淨精緻
            #define NUM_EXPLOSIONS 4.
            #define NUM_PARTICLES 45.

            #define MOD3 vec3(.1031,.11369,.13787)
            vec3 hash31(float p) {
               vec3 p3 = fract(vec3(p) * MOD3);
               p3 += dot(p3, p3.yzx + 19.19);
               return fract(vec3((p3.x + p3.y)*p3.z, (p3.x+p3.z)*p3.y, (p3.y+p3.z)*p3.x));
            }

            // 核心修改：改用實心圓函數，確保粒子粒粒分明，絕不過曝！
            float circ(vec2 uv, vec2 pos, float size) {
                uv -= pos;
                float d = dot(uv, uv);
                // 建立一個清晰邊緣的小圓點
                return S(size * 1.2, size, d);
            }

            vec3 explosion(vec2 uv, vec2 p, float seed, float t) {
                vec3 col = vec3(0.);
                vec3 en = hash31(seed);
                vec3 baseCol = en;
                
                for(float i=0.; i<NUM_PARTICLES; i++) {
                    vec3 n = hash31(i)-.5;
                    
                    // 粒子動畫計時
                    float pt = 1.-pow(t-1., 2.);
                    
                    // 讓重力往下墜的效果更明顯，且緊跟著眼睛
                    vec2 startP = p - vec2(0., pt*pt*.03); 
                    vec2 endP = startP + normalize(n.xy)*n.z*0.18; // 縮小爆炸半徑
                    
                    vec2 pos = mix(p, endP, pt);    
                    
                    // 計算清晰圓點的大小
                    float size = mix(.0001, .00003, S(0., .1, pt));
                    size *= S(1., .2, pt);
                    
                    // 閃爍特效
                    float sparkle = (sin((pt+n.z)*80.)*.5+.5);
                    sparkle = pow(sparkle, 10.) * 0.00002;
                    size += sparkle*B(en.x, en.y, en.z, t);
                    
                    // 使用 circ 畫出粒粒分明的光點，並將顏色疊加
                    float pShape = circ(uv, pos, size);
                    col += baseCol * pShape;
                }
                return col;
            }

            vec3 Rainbow(vec3 c) {
                float t=iTime * 1.5;
                float avg = (c.r+c.g+c.b)/3.;
                c = avg + (c-avg)*sin(vec3(0., .333, .666)+t);
                return c;
            }

            void main() {
                // 讀取相機背景
                vec2 camUv = vec2(1.0 - vUv.x, vUv.y);
                vec3 cameraCol = texture2D(u_cameraTexture, camUv).rgb;
                
                // 換算 WebGL 渲染座標
                vec2 uv = gl_FragCoord.xy / iResolution.xy;
                uv.x -= .5;
                uv.x *= iResolution.x/iResolution.y;
                
                float t = iTime * 1.2; // 煙火施放速度
                vec3 fireworkCol = vec3(0.);
                
                if (u_hasFace > 0.5) {
                    for(float i=0.; i<NUM_EXPLOSIONS; i++) {
                        float et = t + i * 567.89;
                        float id = floor(et);
                        et -= id;
                        
                        // 左右眼輪流發射
                        vec2 targetEye = (mod(i, 2.0) < 1.0) ? u_leftEye : u_rightEye;
                        
                        // 讓煙火稍微在眼睛周圍微幅錯開
                        vec3 offset = hash31(id) - 0.5;
                        vec2 p = targetEye + offset.xy * 0.02; 
                        
                        fireworkCol += explosion(uv, p, id, et);
                    }
                }
                
                // 套用彩虹變色
                fireworkCol = Rainbow(fireworkCol);
                
                // 限制煙火顏色範圍，確保粒粒分明的個體色彩
                fireworkCol = clamp(fireworkCol, 0.0, 1.0);
                
                // 正常的 Alpha 蓋色混合，完全不會有加法造成的死白過曝問題
                vec3 finalCol = mix(cameraCol, fireworkCol, length(fireworkCol));
                
                gl_FragColor = vec4(finalCol, 1.0);
            }
        `;

        function initWebGL() {
            const width = window.innerWidth;
            const height = window.innerHeight;

            renderer = new THREE.WebGLRenderer({ canvas: canvasElement, antialias: true });
            renderer.setSize(width, height);

            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

            cameraTexture = new THREE.VideoTexture(videoElement);
            cameraTexture.minFilter = THREE.LinearFilter;
            cameraTexture.magFilter = THREE.LinearFilter;

            const uniforms = {
                u_cameraTexture: { value: cameraTexture },
                iResolution: { value: new THREE.Vector2(width, height) },
                iTime: { value: 0 },
                u_leftEye: { value: leftEyePos },
                u_rightEye: { value: rightEyePos },
                u_hasFace: { value: 0.0 }
            };

            material = new THREE.ShaderMaterial({
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                uniforms: uniforms
            });

            const geometry = new THREE.PlaneGeometry(2, 2);
            mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            window.addEventListener('resize', onWindowResize);
            animate(0);
        }

        function onWindowResize() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            renderer.setSize(width, height);
            material.uniforms.iResolution.value.set(width, height);
        }

        function animate(timestamp) {
            requestAnimationFrame(animate);
            material.uniforms.iTime.value = timestamp / 1000.0;
            material.uniforms.u_leftEye.value.copy(leftEyePos);
            material.uniforms.u_rightEye.value.copy(rightEyePos);
            material.uniforms.u_hasFace.value = hasFace ? 1.0 : 0.0;

            renderer.render(scene, camera);
        }

        // --- 重新優化直向手機的座標對齊演算法 ---
        const faceMesh = new FaceMesh({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
        });

        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        faceMesh.onResults(results => {
            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                hasFace = true;
                const landmarks = results.multiFaceLandmarks[0];

                // 取得瞳孔精確特徵點
                const leftEye = landmarks[468];
                const rightEye = landmarks[473];

                const screenAspect = window.innerWidth / window.innerHeight;

                // 修正：針對手機 Safari / Chrome 直向網頁（object-fit: cover）的精確對齊轉換
                // 1. 先做鏡像反轉，並將 0~1 轉換到 -0.5 ~ 0.5 區間
                // 2. 將 Y 軸的方向反轉 (MediaPipe 往下為正，WebGL 往上為正)
                // 3. 乘上對應的長寬比調整，達成完美貼合
                
                leftEyePos.x = ((1.0 - leftEye.x) - 0.5) * screenAspect;
                leftEyePos.y = (0.5 - leftEye.y);

                rightEyePos.x = ((1.0 - rightEye.x) - 0.5) * screenAspect;
                rightEyePos.y = (0.5 - rightEye.y);

            } else {
                hasFace = false;
            }
        });

        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                await faceMesh.send({ image: videoElement });
            },
            width: 1280,
            height: 720
        });

        window.addEventListener('load', () => {
            initWebGL();
            cameraUtils.start().catch(err => {
                console.error(err);
            });
        });
    </script>
</body>
</html>
