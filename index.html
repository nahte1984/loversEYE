<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>whenever i see u | v9.6</title>
    <style>
        /* 鎖定全螢幕，防止 Safari 動態網址列推擠畫面 */
        html, body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            position: fixed; 
            width: 100%;
            height: 100%;
        }

        #webgl-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%; 
            height: 100%; 
            display: block; 
            z-index: 10;
        }

        #webcam {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%; 
            height: 100%; 
            background-color: #000;
            z-index: 20;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #start-btn {
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        #start-btn:active {
            transform: scale(0.95);
        }

        @media (orientation: portrait) {
            #start-btn {
                width: 70vw;
                height: auto;
            }
        }

        @media (orientation: landscape) {
            #start-btn {
                width: auto;
                height: 70vh;
            }
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="start-screen">
        <img id="start-btn" src="start.png" alt="Start Experience">
    </div>

    <video id="webcam" autoplay playsinline></video>
    <canvas id="webgl-canvas"></canvas>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('webgl-canvas');
        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('start-btn');

        let renderer, scene, camera, material, mesh, cameraTexture;
        
        const MAX_FACES = 2; 
        // 預設將座標放在畫面外，避免相機未啟動時閃爍
        let leftEyesRaw = Array(MAX_FACES).fill().map(() => new THREE.Vector2(-10, -10));
        let rightEyesRaw = Array(MAX_FACES).fill().map(() => new THREE.Vector2(-10, -10));
        let mouthsRaw = Array(MAX_FACES).fill().map(() => new THREE.Vector2(-10, -10));
        let mouthsOpen = Array(MAX_FACES).fill(0.0); 
        let faceCount = 0;

        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            uniform sampler2D u_cameraTexture; 
            uniform vec2 iResolution;
            uniform vec2 u_videoResolution;
            uniform float iTime;
            
            const int MAX_FACES = ${MAX_FACES};
            // 接收 JS 精準計算好的 Scaled 座標，不再由 Shader 自己瞎猜
            uniform vec2 u_leftEyes[MAX_FACES];   
            uniform vec2 u_rightEyes[MAX_FACES];  
            uniform vec2 u_mouths[MAX_FACES];
            uniform float u_mouthsOpen[MAX_FACES];
            uniform int u_faceCount;
            
            varying vec2 vUv;

            #define PI      3.141592653589793
            #define TWO_PI  6.283185307179586

            // ==========================================
            // 背景煙火設定 (兩倍熱鬧版)
            // ==========================================
            #define Gravitational_ACCE vec2(0.0, -0.2)
            #define NUM_SPARKS 25    // 原 12，翻倍
            #define NUM_FIREWORKS 6  // 原 3，翻倍
            #define Period 8.0

            float rand(float co) { 
                return fract(sin(co*(91.3458)) * 47453.5453);
            }

            vec3 spark(vec2 coord, vec2 origin, vec3 sparkColor, vec2 velocity, float periodTime, float seed) {
                vec2 displacement = velocity * periodTime + 0.5 * Gravitational_ACCE * periodTime * periodTime;
                vec2 sparkPos = origin + displacement;
                float len = length(coord - sparkPos);
                
                vec3 color = sparkColor * pow(1.0 - smoothstep(0.001, 0.05, len), 8.0);
                color += vec3(1.0) * (1.0 - smoothstep(0.001, 0.005, len));
                color *= (1.0 - smoothstep(0.0, Period, periodTime));
                color *= sin(periodTime*50.0 + seed)*0.4 + 0.6;
                return color;
            }

            vec3 firework(vec2 coord, float currentPeriod, float periodTime) {   
                vec2 origin;
                origin.x = (0.2 + 0.6*rand(currentPeriod)) * iResolution.x/iResolution.y ;
                origin.y = (0.4 + 0.4*rand(currentPeriod));

                vec3 color = vec3(0.0);
                for(int j=0; j < NUM_SPARKS; j++) {
                    float fj = float(j);
                    vec2 velocity;
                    velocity.x = 0.5*(rand(currentPeriod+fj*0.4)-0.5);
                    velocity.y = 0.5*(rand(currentPeriod+fj*0.5)-0.5);
                    velocity = normalize(velocity);
                    velocity *= 0.2 + rand(currentPeriod+fj*0.6) * 0.3;
                    
                    vec3 sparkColor;
                    sparkColor.r = 0.3+0.7*rand(currentPeriod+fj*0.1);
                    sparkColor.g = 0.3+0.7*rand(currentPeriod+fj*0.2);
                    sparkColor.b = 0.3+0.7*rand(currentPeriod+fj*0.3);
                    color += spark(coord, origin, sparkColor, velocity, periodTime, fj);
                }
                return color;
            }

            // ==========================================
            // 愛心煙火設定
            // ==========================================
            float star5SDF( vec2 p, float r, float m){
                const vec2 k1 = vec2(0.809016994375, -0.587785252292);
                const vec2 k2 = vec2(-k1.x,k1.y);
                p.x = abs(p.x);
                p -= 2.0*max(dot(k1,p),0.0)*k1;
                p -= 2.0*max(dot(k2,p),0.0)*k2;
                p.x = abs(p.x);
                p.y -= r;
                vec2 ab = m*vec2(-k1.y,k1.x) - vec2(0,r); 
                float h = clamp( dot(p,ab)/dot(ab,ab), 0.0, 1.0 );
                return length(p-ab*h) * sign(p.y*ab.x-p.x*ab.y);
            }

            float hash1(float p){
                p = fract(p * .1031*9811.164);  
                p *= p + 33.33; 
                p *= p + p;
                return fract(p);
            }

            vec3 colorRibbon(float t){
                return abs(mod(vec3(0.,1.,2.)/3. + t, 1.) - .5) * 4. - 0.5;
            }

            vec2 getHeartPosition(float t){
                return vec2(16.0 * sin(t) * sin(t) * sin(t), -(13.0 * cos(t) - 5.0 * cos(2.0*t)- 2.0 * cos(3.0*t) - cos(4.0*t)));
            }

            vec3 renderHeartFireworks(vec2 scaled_uv, vec2 center, float timeOffset) {
                // 距離大於 0.9 放棄計算，為超多粒子數量提供效能保障
                float dist = length(scaled_uv - center);
                if(dist > 0.9) return vec3(0.0);

                float t = (iTime * 0.35) + timeOffset; 
                vec3 color = vec3(0.);
                
                // --- 超熱鬧參數設定 ---
                const float jmax = 4.0;  // 煙火層次：原 2.0 -> 4.0
                const float imax = 25.0; // 每層粒子數：原 15.0 -> 25.0

                for(float j=0.; j<jmax; j++){
                    float ja = j/jmax;
                    float local_t = t - hash1(ja*33.669) * 2.0; 
                    float t1 = floor(local_t); 
                    float t2fb = fract(local_t); 
                    
                    float flasht = t2fb * (step(0.0, t2fb) - step(0.1, t2fb)) * 10.;
                    vec3 col = colorRibbon(hash1(ja + t1)); 
                    
                    for(float k=0.; k<imax; k++){ 
                        float ia = k/imax;
                        float randOffset = (hash1(ia + t1) - 0.5) * 0.2;
                        
                        vec2 heartOffset = getHeartPosition(ia * TWO_PI + randOffset) * t2fb * -0.045; 
                        vec2 layer2_pos = center + heartOffset;
                        
                        float blink = step(1., mod(k, 2.)); 
                        float sdf = star5SDF((scaled_uv - layer2_pos) * 1.2, 0.05, 0.09) + 0.05;
                        float fade = 1.0 - pow(t2fb, 2.0); 
                        
                        color += col * smoothstep(-0.016, flasht*3.6+4.5+ sin(t2fb*30.)*blink, (0.018/sdf)) * fade;
                    }
                }
                return color;
            }

            void main() {
                float screenAspect = iResolution.x / iResolution.y;
                float videoAspect = u_videoResolution.x / u_videoResolution.y;
                
                vec2 screenCenter = vec2(0.5, 0.5);
                vec2 dirFromCenter = vUv - screenCenter;
                float distFromCenter = length(dirFromCenter);

                vec3 cameraCol = vec3(0.0);
                float blurStrength = smoothstep(0.2, 0.8, distFromCenter) * 0.40; 
                
                const int SAMPLES = 10; 
                for (int s = 0; s < SAMPLES; s++) {
                    float t_blur = (float(s) / float(SAMPLES - 1)) - 0.5;
                    vec2 sampleUV = vUv + dirFromCenter * (t_blur * blurStrength);
                    
                    vec2 camUv = sampleUV;
                    if (screenAspect < videoAspect) {
                        float scale = screenAspect / videoAspect;
                        camUv.x = (sampleUV.x - 0.5) * scale + 0.5;
                    } else {
                        float scale = videoAspect / screenAspect;
                        camUv.y = (sampleUV.y - 0.5) * scale + 0.5;
                    }
                    
                    vec2 lookupUv = vec2(1.0 - camUv.x, camUv.y);
                    cameraCol += texture2D(u_cameraTexture, lookupUv).rgb;
                }
                cameraCol /= float(SAMPLES);
                
                cameraCol *= 0.55;
                vec3 finalCol = cameraCol;

                vec2 fwCoord = gl_FragCoord.xy / iResolution.y;
                vec3 fwColor = vec3(0.0);
                
                for(int f=0; f < NUM_FIREWORKS; f++) {
                    float ff = float(f);
                    float timeOffset = Period / float(NUM_FIREWORKS) * (0.5 + rand(ff));
                    float time = iTime + ff*timeOffset;
                    float periodTime = mod(time, Period);
                    float periodOffset = ff * 10.0; 
                    float currentPeriod = floor(time/Period + periodOffset);
                    
                    fwColor += firework(fwCoord, currentPeriod, periodTime);
                }
                finalCol = clamp(finalCol + fwColor, 0.0, 1.0);

                vec2 uv = gl_FragCoord.xy / iResolution.xy;
                uv.x -= 0.5;
                uv.x *= screenAspect;
                uv.y -= 0.5;
                
                vec2 scaled_uv = uv * 2.0;
                vec3 faceFX = vec3(0.0);
                
                // 直接使用計算好的絕對座標，不再有對位誤差
                for (int idx = 0; idx < MAX_FACES; idx++) {
                    if (idx >= u_faceCount) break;

                    vec2 scaled_leftEye = u_leftEyes[idx];
                    vec2 scaled_rightEye = u_rightEyes[idx];
                    
                    if (length(scaled_uv - scaled_leftEye) < 0.9) {
                        faceFX += renderHeartFireworks(scaled_uv, scaled_leftEye, float(idx) * 0.1);
                    }
                    if (length(scaled_uv - scaled_rightEye) < 0.9) {
                        faceFX += renderHeartFireworks(scaled_uv, scaled_rightEye, float(idx) * 0.1 + 0.5);
                    }

                    if (u_mouthsOpen[idx] > 0.5) {
                        vec2 scaled_mouth = u_mouths[idx];
                        if (length(scaled_uv - scaled_mouth) < 0.9) {
                            faceFX += renderHeartFireworks(scaled_uv, scaled_mouth, float(idx) * 0.1 + 0.25); 
                        }
                    }
                }
                
                finalCol = clamp(finalCol + faceFX, 0.0, 1.0);
                
                float vignette = smoothstep(0.75, 0.25, distFromCenter);
                finalCol *= mix(0.3, 1.0, vignette);

                gl_FragColor = vec4(finalCol, 1.0);
            }
        `;

        function initWebGL() {
            const width = window.innerWidth;
            const height = window.innerHeight;

            renderer = new THREE.WebGLRenderer({ canvas: canvasElement, antialias: true });
            renderer.setSize(width, height);
            
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.2));

            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

            cameraTexture = new THREE.VideoTexture(videoElement);
            cameraTexture.minFilter = THREE.LinearFilter;
            cameraTexture.magFilter = THREE.LinearFilter;

            const uniforms = {
                u_cameraTexture: { value: cameraTexture },
                iResolution: { value: new THREE.Vector2(width, height) },
                u_videoResolution: { value: new THREE.Vector2(1280, 720) }, 
                iTime: { value: 0 },
                u_leftEyes: { value: leftEyesRaw },
                u_rightEyes: { value: rightEyesRaw },
                u_mouths: { value: mouthsRaw },
                u_mouthsOpen: { value: mouthsOpen },
                u_faceCount: { value: 0 }
            };

            material = new THREE.ShaderMaterial({
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                uniforms: uniforms
            });

            const geometry = new THREE.PlaneGeometry(2, 2);
            mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            window.addEventListener('resize', onWindowResize);
            animate(0);
        }

        function onWindowResize() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            renderer.setSize(width, height);
            material.uniforms.iResolution.value.set(width, height);
        }

        function animate(timestamp) {
            requestAnimationFrame(animate);
            material.uniforms.iTime.value = timestamp / 1000.0;
            
            material.uniforms.u_leftEyes.value = leftEyesRaw;
            material.uniforms.u_rightEyes.value = rightEyesRaw;
            material.uniforms.u_mouths.value = mouthsRaw;
            material.uniforms.u_mouthsOpen.value = mouthsOpen;
            material.uniforms.u_faceCount.value = faceCount;
            
            if (videoElement.videoWidth) {
                material.uniforms.u_videoResolution.value.set(videoElement.videoWidth, videoElement.videoHeight);
            }

            renderer.render(scene, camera);
        }

        const faceMesh = new FaceMesh({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
        });

        faceMesh.setOptions({
            maxNumFaces: MAX_FACES,
            refineLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        const MOUTH_OPEN_THRESHOLD = 0.03; 

        // 核心數學修正：精準計算 Cover 模式下的實體螢幕座標
        function getMappedCoord(rawX, rawY) {
            if (!videoElement.videoWidth || !window.innerWidth) return new THREE.Vector2(-10, -10);

            let videoAspect = videoElement.videoWidth / videoElement.videoHeight;
            let screenAspect = window.innerWidth / window.innerHeight;
            let vUvX, vUvY;

            if (screenAspect < videoAspect) {
                let scale = screenAspect / videoAspect;
                // 畫面窄，X被放大並偏移
                vUvX = (0.5 - rawX) / scale + 0.5;
                vUvY = 1.0 - rawY; 
            } else {
                let scale = videoAspect / screenAspect;
                // 畫面寬，Y被放大並偏移
                vUvX = 1.0 - rawX;
                vUvY = (0.5 - rawY) / scale + 0.5;
            }

            // 轉換至 Shader 專用的 scaled_uv 空間
            let scaledX = (vUvX - 0.5) * screenAspect * 2.0;
            let scaledY = (vUvY - 0.5) * 2.0;

            return new THREE.Vector2(scaledX, scaledY);
        }

        faceMesh.onResults(results => {
            faceCount = 0;
            mouthsOpen.fill(0.0); 

            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                faceCount = Math.min(results.multiFaceLandmarks.length, MAX_FACES);

                for (let idx = 0; idx < faceCount; idx++) {
                    const landmarks = results.multiFaceLandmarks[idx];
                    
                    const leftEye = landmarks[468];
                    const rightEye = landmarks[473];
                    
                    if (leftEye && rightEye) {
                        // 使用新的數學函式計算完美對位座標
                        leftEyesRaw[idx] = getMappedCoord(leftEye.x, leftEye.y);
                        rightEyesRaw[idx] = getMappedCoord(rightEye.x, rightEye.y);
                    }

                    const upperLipInner = landmarks[13];
                    const lowerLipInner = landmarks[14];

                    if (upperLipInner && lowerLipInner) {
                        let mouthCenterX = (upperLipInner.x + lowerLipInner.x) / 2.0;
                        let mouthCenterY = (upperLipInner.y + lowerLipInner.y) / 2.0;
                        
                        mouthsRaw[idx] = getMappedCoord(mouthCenterX, mouthCenterY);

                        const mouthDistance = Math.sqrt(
                            Math.pow(upperLipInner.x - lowerLipInner.x, 2) +
                            Math.pow(upperLipInner.y - lowerLipInner.y, 2) +
                            Math.pow(upperLipInner.z - lowerLipInner.z, 2)
                        );

                        if (mouthDistance > MOUTH_OPEN_THRESHOLD) {
                            mouthsOpen[idx] = 1.0; 
                        }
                    }
                }
            } else {
                // 如果沒偵測到臉，把座標藏在畫面外
                leftEyesRaw.fill(new THREE.Vector2(-10, -10));
                rightEyesRaw.fill(new THREE.Vector2(-10, -10));
                mouthsRaw.fill(new THREE.Vector2(-10, -10));
            }
        });

        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                await faceMesh.send({ image: videoElement });
            },
            width: 1280,
            height: 720
        });

        let isStarted = false;
        
        startBtn.addEventListener('click', () => {
            if (isStarted) return;
            isStarted = true;
            
            startScreen.style.display = 'none';

            initWebGL();
            cameraUtils.start().catch(err => {
                console.error("Camera failed to start.", err);
                alert("Please check your device settings to ensure camera access is enabled.");
                
                startScreen.style.display = 'flex'; 
                isStarted = false;
            });
        });
        
    </script>
</body>
</html>
