<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>v2.1 stardust</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }
        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 1.2rem;
            pointer-events: none;
            transition: opacity 0.5s ease;
            z-index: 10;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="loading">正在建構平衡記憶體...</div>
    <canvas id="canvas"></canvas>

    <!-- Shader 1: 核心記憶烙印與衰減 Shader -->
    <script id="fragmentShader" type="x-shader/x-fragment">
        uniform vec2 iResolution;
        uniform float iTime;
        uniform sampler2D iChannel0;    // 即時相機輸入
        uniform sampler2D textureDelay; // 歷史記憶 Buffer

        void main() {
            vec2 fragCoord = gl_FragCoord.xy;
            vec2 origUV = fragCoord / iResolution.xy; 
            
            // 讀取上一影格留在這裡的顏色
            vec3 lastMemory = texture2D(textureDelay, origUV).rgb;

            // 計算當下的 Kali Loop 粒子結構
            float time = (iTime + 100.0) * 20.0; 
            float s = 0.0;
            
            vec2 camUV = origUV;
            camUV.x = 1.0 - camUV.x; // 鏡像修正
            
            vec2 uv = (-iResolution.xy + 2.0 * fragCoord ) / iResolution.y;
            float t = time * 0.005;
            float si = sin(t * 1.5);
            float co = cos(t);
            uv *= mat2(co, si, -si, co);

            vec3 currentParticle = vec3(0.0);
            vec3 init = vec3(0.25, 0.25, time * 0.001);

            for (int r = 0; r < 50; r++) {
                vec3 p = init + s * vec3(uv, 0.15);
                p.z = mod(p.z, 2.0);
                
                for (int i = 0; i < 10; i++) {
                    p = abs(p * 2.04) / dot(p, p) - 0.75;
                }
                
                float scarcity = 0.4; 
                float energy = length(p) * scarcity;
                // 提高到 5.0 次方！讓粒子線條變得極其細緻、稀疏
                energy = pow(energy, 5.0); 
                
                float fade = smoothstep(0.0, 0.5, 1.0 - s);
                vec3 camCol = texture2D(iChannel0, camUV).rgb;
                
                currentParticle += camCol * energy * fade * 0.015;
                s += 0.015;
            }
            currentParticle = pow(currentParticle, vec3(0.9));

            // 【新陳代謝核心機制】
            vec3 finalLog;
            if (length(currentParticle) > 0.3) { 
                // 當前有強烈粒子撞擊時，印上新顏色。
                // 舊記憶乘以 0.95，確保新顏色能覆蓋舊顏色，不會無限疊加到爆白
                finalLog = max(currentParticle, lastMemory * 0.95);
            } else {
                // 【關鍵微調】：粒子沒經過時，讓舊記憶以 0.965 的速度衰減
                // 這會讓定格的彩色粒子大約在 2~3 秒內緩慢風化消失，永遠保持畫面有黑有亮
                finalLog = lastMemory * 0.965;
            }
            
            // 擋掉極度微小的雜訊，確保背景是純黑
            if(length(finalLog) < 0.01) finalLog = vec3(0.0);
            
            gl_FragColor = vec4(finalLog, 1.0);
        }
    </script>

    <!-- Shader 2: 純輸出 Shader -->
    <script id="displayFragmentShader" type="x-shader/x-fragment">
        uniform vec2 iResolution;
        uniform sampler2D textureMemory;
        void main() {
            vec2 uv = gl_FragCoord.xy / iResolution.xy;
            gl_FragColor = vec4(texture2D(textureMemory, uv).rgb, 1.0);
        }
    </script>

    <script id="vertexShader" type="x-shader/x-vertex">
        void main() {
            gl_Position = vec4(position, 1.0);
        }
    </script>

    <script>
        let scene, camera, renderer;
        let video, videoTexture;
        let clock = new THREE.Clock();
        
        let calcScene, calcMaterial;
        let dispScene, dispMaterial;
        let rtA, rtB;
        
        let uniformsCalc, uniformsDisp;
        const loadingEl = document.getElementById('loading');

        async function setupCamera() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                loadingEl.innerText = "你的瀏覽器不支援相機功能";
                return null;
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 640, height: 480, facingMode: "user" },
                    audio: false
                });
                video = document.createElement('video');
                video.srcObject = stream;
                video.autoplay = true;
                video.playsInline = true;
                video.muted = true;
                return new Promise((resolve) => {
                    video.addEventListener('timeupdate', () => resolve(video), { once: true });
                    video.play().catch(err => console.error(err));
                });
            } catch (err) {
                loadingEl.innerText = "無法取得相機權限：" + err.message;
                return null;
            }
        }

        function initWebGL(videoElement) {
            const canvas = document.getElementById('canvas');
            const w = window.innerWidth;
            const h = window.innerHeight;
            
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: false });
            renderer.setSize(w, h);
            
            camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            videoTexture = new THREE.VideoTexture(videoElement);

            rtA = new THREE.WebGLRenderTarget(w, h);
            rtB = new THREE.WebGLRenderTarget(w, h);

            calcScene = new THREE.Scene();
            uniformsCalc = {
                iTime: { value: 0 },
                iResolution: { value: new THREE.Vector2(w, h) },
                iChannel0: { value: videoTexture },
                textureDelay: { value: null }
            };
            calcMaterial = new THREE.ShaderMaterial({
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                uniforms: uniformsCalc
            });
            const calcMesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), calcMaterial);
            calcScene.add(calcMesh);

            dispScene = new THREE.Scene();
            uniformsDisp = {
                iResolution: { value: new THREE.Vector2(w, h) },
                textureMemory: { value: null }
            };
            dispMaterial = new THREE.ShaderMaterial({
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('displayFragmentShader').textContent,
                uniforms: uniformsDisp
            });
            const dispMesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), dispMaterial);
            dispScene.add(dispMesh);

            loadingEl.style.opacity = 0;
            setTimeout(() => loadingEl.remove(), 500);

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            renderer.setSize(w, h);
            rtA.setSize(w, h);
            rtB.setSize(w, h);
            uniformsCalc.iResolution.value.set(w, h);
            uniformsDisp.iResolution.value.set(w, h);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            uniformsCalc.iTime.value = clock.getElapsedTime();
            
            uniformsCalc.textureDelay.value = rtB.texture;
            renderer.setRenderTarget(rtA);
            renderer.render(calcScene, camera);
            
            uniformsDisp.textureMemory.value = rtA.texture;
            renderer.setRenderTarget(null);
            renderer.render(dispScene, camera);
            
            let temp = rtA;
            rtA = rtB;
            rtB = temp;
        }

        async function main() {
            const videoElement = await setupCamera();
            if (videoElement) {
                initWebGL(videoElement);
                animate();
            }
        }
        main();
    </script>
</body>
</html>
